apiVersion: v1
kind: ConfigMap
metadata: # kpt-merge: sdcore5g-cp/kafka-scripts
  name: kafka-scripts
  namespace: sdcore5g-cp
  labels:
    app.kubernetes.io/name: kafka
    helm.sh/chart: kafka-20.0.4
    app.kubernetes.io/instance: sdcore5g
    app.kubernetes.io/managed-by: Helm
  annotations:
    internal.kpt.dev/upstream-identifier: '|ConfigMap|sdcore5g-cp|kafka-scripts'
data:
  setup.sh: |-
    #!/bin/bash

    ID="${MY_POD_NAME#"kafka-"}"
    if [[ -f "/bitnami/kafka/data/meta.properties" ]]; then
        export KAFKA_CFG_BROKER_ID="$(grep "broker.id" "/bitnami/kafka/data/meta.properties" | awk -F '=' '{print $2}')"
    else
        export KAFKA_CFG_BROKER_ID="$((ID + 0))"
    fi

    # Configure zookeeper client

    exec /entrypoint.sh /run.sh
