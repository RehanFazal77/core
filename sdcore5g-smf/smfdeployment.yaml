apiVersion: workload.nephio.org/v1alpha1
kind: NFDeployment
metadata: # kpt-merge: smf-example/smf-example
  name: smf-core
  namespace: sdcore5g-cp
  annotations:
    internal.kpt.dev/upstream-identifier: 'workload.nephio.org|NFDeployment|smf-example|smf-example'
spec:
  provider: smf.sdcore5g.io
  interfaces:
  - name: n4
    ipv4:
      address: 172.1.128.1/17
      gateway: ""
    vlanID: 4
  networkInstances:
  - name: vpc-internal
    interfaces:
    - n4
  parametersRefs:
  - name: smf-core-upf-core
    apiVersion: ref.nephio.org/v1alpha1
    kind: Config
  - name: smf-core-upf-sdcore
    apiVersion: ref.nephio.org/v1alpha1
    kind: Config
  capacity:
    maxDownlinkThroughput: "0"
    maxNFConnections: 5
    maxSessions: 500
    maxUplinkThroughput: "0"
